<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
      color: white;
      overflow-x: hidden;
    }

    /* mgła */
    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 800px;
      height: 800px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(59,130,246,0.25), rgba(124,58,237,0.15), transparent 70%);
      filter: blur(120px);
      animation: pulse 8s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    .glass {
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
    }

    .glow:hover {
      box-shadow: 0 0 25px rgba(59,130,246,0.6);
    }

    .terminal {
      background: #020617;
      border-radius: 12px;
      padding: 20px;
      font-family: monospace;
      color: #22c55e;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="h-screen flex flex-col justify-center items-center text-center px-4">
  <h1 class="text-5xl md:text-7xl font-extrabold mb-6">
    Cześć, jestem devem 👨‍💻
  </h1>

  <p class="text-gray-400 text-lg max-w-xl mb-8">
    Buduję systemy od podstaw: AI, interpretery, backendy.
  </p>

  <a href="#projects" id="btn"
     class="glass glow px-8 py-3 rounded-2xl text-lg hover:scale-110 transition">
    Zobacz projekty ↓
  </a>
</section>

<!-- TERMINAL -->
<section id="terminalSection" class="hidden px-6 max-w-4xl mx-auto">
  <h2 class="text-3xl font-bold mb-6">Terminal</h2>

  <div class="terminal">
    <div id="terminalText"></div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="py-24 px-6 max-w-6xl mx-auto">
  <h2 class="text-4xl font-bold mb-16 text-center">Projekty</h2>

  <div class="grid md:grid-cols-3 gap-10">

    <div class="glass p-6 rounded-2xl glow hover:-translate-y-3 transition">
      <h3 class="text-2xl font-semibold mb-2">Neural Network</h3>
      <p class="text-gray-400">C++ bez bibliotek</p>
    </div>

    <div class="glass p-6 rounded-2xl glow hover:-translate-y-3 transition">
      <h3 class="text-2xl font-semibold mb-2">Interpreter</h3>
      <p class="text-gray-400">ANTLR + własny język</p>
    </div>

    <div class="glass p-6 rounded-2xl glow hover:-translate-y-3 transition">
      <h3 class="text-2xl font-semibold mb-2">Snake</h3>
      <p class="text-gray-400">SFML</p>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section class="py-24 text-center">
  <h2 class="text-4xl font-bold mb-6">Kontakt</h2>
  <p class="text-gray-400">twoj@email.com</p>
</section>

<!-- JS -->
<script>
const btn = document.getElementById("btn");
const terminal = document.getElementById("terminalSection");
const text = document.getElementById("terminalText");

btn.onclick = (e) => {
  e.preventDefault();

  terminal.classList.remove("hidden");

  terminal.scrollIntoView({ behavior: "smooth" });

  type();
};

const lines = [
  "loading portfolio...",
  "initializing...",
  "neural network ready",
  "interpreter loaded",
  "projects online"
];

let i = 0;

function type() {
  if (i >= lines.length) return;

  let line = lines[i];
  let j = 0;

  let interval = setInterval(() => {
    text.innerHTML += line[j] || "";
    j++;

    if (j >= line.length) {
      text.innerHTML += "<br>";
      clearInterval(interval);
      i++;
      setTimeout(type, 400);
    }
  }, 30);
}

/* KURSOR — DZIAŁAJĄCY */
const glow = document.createElement("div");

glow.style.position = "fixed";
glow.style.width = "250px";
glow.style.height = "250px";
glow.style.borderRadius = "50%";
glow.style.pointerEvents = "none";
glow.style.background = "radial-gradient(circle, rgba(0,150,255,0.35), transparent 60%)";
glow.style.filter = "blur(40px)";
glow.style.zIndex = "999999";

document.body.appendChild(glow);

document.addEventListener("mousemove", (e) => {
  glow.style.left = (e.clientX - 125) + "px";
  glow.style.top = (e.clientY - 125) + "px";
});
</script>

</body>
</html>
